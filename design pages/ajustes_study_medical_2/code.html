<!DOCTYPE html>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings - Study Medical</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<span class="material-symbols-outlined text-xs">edit</span>
</button>
</div>
<div class="flex flex-col justify-center">
<p class="text-xl font-bold leading-tight tracking-tight">Dr. Alex Rivers</p>

<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">alex.rivers@meduniversity.edu</p>

</div>

</div>
<label class="relative flex h-[31px] w-[51px] cursor-pointer items-center rounded-full border-none bg-slate-200 dark:bg-slate-700 p-0.5 has-[:checked]:bg-primary transition-colors">

<input checked="" class="invisible absolute peer" type="checkbox"/>

<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-10">

</div>
<div class="flex gap-2">

</div>

<p class="text-base font-medium">Notifications</p>

</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 px-4 py-4 hover:bg-primary/5 transition-colors">

<span class="material-symbols-outlined">track_changes</span>
</div>
<div class="flex-1 text-left">
<p class="text-base font-medium">Daily Goals</p>
<p class="text-xs text-slate-500">Currently set to 50 cards/day</p>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center gap-4 px-4 py-4 hover:bg-primary/5 transition-colors">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">history_edu</span>
</div>
<div class="flex-1 text-left">
<p class="text-base font-medium">Review Algorithm</p>
<p class="text-xs text-slate-500">Spaced Repetition (Anki-style)</p>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>

<section class="space-y-3">
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Support</h3>
<div class="bg-white dark:bg-slate-800 rounded-xl border border-primary/5 overflow-hidden divide-y divide-primary/5">

<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">help</span>
</div>

<span class="material-symbols-outlined text-slate-400">chevron_right</span>

<button class="w-full flex items-center gap-4 px-4 py-4 hover:bg-primary/5 transition-colors">

<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">school</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Study</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">menu_book</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Library</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">smart_toy</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">AI</p>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span>

</a>
