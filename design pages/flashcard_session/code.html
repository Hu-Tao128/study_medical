<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Medical Flashcard Session</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark">
<!-- Header / Top Bar -->
<div class="flex items-center px-4 py-4 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-500 cursor-pointer">close</span>
</div>
<div class="flex flex-col items-center">
<span class="text-xs font-bold uppercase tracking-wider text-slate-400">Card Progress</span>
<h2 class="text-lg font-bold leading-tight">12 / 50</h2>
</div>
<div class="w-8"></div> <!-- Spacer for symmetry -->
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-2 p-4">
<div class="h-2 w-full rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
<div class="h-full bg-primary" style="width: 24%;"></div>
</div>
</div>
<!-- Main Flashcard Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4">
<div class="w-full aspect-[3/4] max-h-[500px] relative group cursor-pointer">
<div class="w-full h-full bg-white dark:bg-slate-900 rounded-xl shadow-xl flex flex-col items-center justify-center p-8 border border-slate-100 dark:border-slate-800 relative">
<!-- Decorative medical icon background -->
<div class="absolute top-4 left-4 opacity-10">
<span class="material-symbols-outlined text-6xl">cardiology</span>
</div>
<div class="text-center">
<p class="text-primary font-semibold text-sm uppercase tracking-widest mb-2">Medical Terminology</p>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white leading-tight">Atrial Fibrillation</h1>
<p class="mt-4 text-slate-500 dark:text-slate-400 text-sm italic">Tap to flip card for definition</p>
</div>
<!-- Flip Icon bottom right -->
<button class="absolute bottom-6 right-6 flex h-12 w-12 items-center justify-center rounded-full bg-primary text-white shadow-lg">
<span class="material-symbols-outlined">flip_camera_android</span>
</button>
</div>
</div>
</main>
<!-- Rating Buttons Section -->
<div class="p-6">
<h4 class="text-slate-500 dark:text-slate-400 text-sm font-bold leading-normal tracking-widest px-4 py-4 text-center uppercase">Rate your recall</h4>
<div class="flex gap-3 justify-between items-center">
<!-- Hard Button -->
<button class="flex-1 flex flex-col items-center gap-2 p-4 rounded-xl bg-red-50 dark:bg-red-950/30 border border-red-100 dark:border-red-900/50 hover:bg-red-100 dark:hover:bg-red-900/50 transition-colors">
<span class="material-symbols-outlined text-red-600">sentiment_dissatisfied</span>
<span class="text-red-700 dark:text-red-400 font-bold text-sm">Hard</span>
</button>
<!-- Good Button -->
<button class="flex-1 flex flex-col items-center gap-2 p-4 rounded-xl bg-primary/10 dark:bg-primary/20 border border-primary/20 dark:border-primary/40 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-primary">sentiment_satisfied</span>
<span class="text-primary font-bold text-sm">Good</span>
</button>
<!-- Easy Button -->
<button class="flex-1 flex flex-col items-center gap-2 p-4 rounded-xl bg-green-50 dark:bg-green-950/30 border border-green-100 dark:border-green-900/50 hover:bg-green-100 dark:hover:bg-green-900/50 transition-colors">
<span class="material-symbols-outlined text-green-600">sentiment_very_satisfied</span>
<span class="text-green-700 dark:text-green-400 font-bold text-sm">Easy</span>
</button>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md px-4 pb-6 pt-2">
<div class="flex gap-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-tight">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">book_2</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-tight">Study</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">library_books</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-tight">Library</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">smart_toy</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-tight">AI Assistant</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-tight">Profile</p>
</a>
</div>
</nav>
</div>
</body></html>
