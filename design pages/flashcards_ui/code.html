<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#137fec",
                "background-light": "#f6f7f8",
                "background-dark": "#101922",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>MedCards - Study Session</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Navigation -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="flex flex-col items-center">
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Cardiology Basics</h2>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Session: 45 cards left</p>
</div>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center rounded-full size-10 hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-900 dark:text-slate-100 transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Progress Indicator -->
<div class="flex flex-col gap-2 p-4 max-w-2xl mx-auto w-full">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium">Daily Goal Progress</p>
<p class="text-primary text-sm font-bold">13 / 20</p>
</div>
<div class="rounded-full bg-slate-200 dark:bg-slate-800 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 65%;"></div>
</div>
</div>
<!-- Main Flashcard Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 @container">
<div class="w-full max-w-md perspective-1000">
<div class="relative w-full aspect-[3/4] rounded-xl shadow-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex flex-col overflow-hidden group">
<!-- Card Image -->
<div class="w-full h-1/2 bg-center bg-no-repeat bg-cover relative" data-alt="Anatomical illustration of a human heart with aorta" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDL8NL3IKUHHITUH77o75o9-1tr5SSbIXAtlmcfYvTjphez1TgecyRmf8HX_t2PoCT2ESUHvVb0IWPVlcVU5a_jHGakMXkoIGNXoU2cbsKY_ZlvgdPuKNo_nNOkAeyPDOe7zjDIwqP_8mKjW1rk5mVi_tqmfIpukxQFMQCDWPeNplR8pFdUf0rYwvAAPiXZ9vE5MyWmNrU421DmIi_yTRomSaB1x57Y9sf6BoCZsQhoEaXMKZQTHkabf4l6cX3IiX_G_23mIMIcYck");'>
<div class="absolute inset-0 bg-gradient-to-t from-white dark:from-slate-900 to-transparent opacity-20"></div>
</div>
<!-- Card Content -->
<div class="flex flex-1 flex-col items-center justify-center gap-4 p-8 text-center">
<div class="flex flex-col gap-1">
<span class="text-primary text-xs font-bold tracking-widest uppercase px-3 py-1 bg-primary/10 rounded-full self-center">Cardiology</span>
</div>
<div class="space-y-2">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium tracking-wide">TERM</p>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight">Aneurisma de Aorta</h1>
</div>
<div class="mt-4">
<button class="text-primary text-sm font-semibold flex items-center gap-2 hover:underline">
<span class="material-symbols-outlined text-sm">visibility</span>
                            Tap to reveal answer
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- Interaction Section -->
<section class="p-6 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 rounded-t-xl shadow-2xl">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-xl font-bold leading-tight text-center pb-6">How well did you know this?</h3>
<div class="grid grid-cols-3 gap-4 max-w-2xl mx-auto">
<!-- Hard Button -->
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 hover:border-red-400 dark:hover:border-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-all group">
<div class="size-10 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-600 dark:text-red-400 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">sentiment_very_dissatisfied</span>
</div>
<div class="text-center">
<p class="font-bold text-slate-900 dark:text-slate-100">Hard</p>
<p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">1 min</p>
</div>
</button>
<!-- Medium Button -->
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 hover:border-amber-400 dark:hover:border-amber-500 hover:bg-amber-50 dark:hover:bg-amber-900/10 transition-all group">
<div class="size-10 rounded-full bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center text-amber-600 dark:text-amber-400 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">sentiment_neutral</span>
</div>
<div class="text-center">
<p class="font-bold text-slate-900 dark:text-slate-100">Good</p>
<p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">1 day</p>
</div>
</button>
<!-- Easy Button -->
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 hover:border-green-400 dark:hover:border-green-500 hover:bg-green-50 dark:hover:bg-green-900/10 transition-all group">
<div class="size-10 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600 dark:text-green-400 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">sentiment_very_satisfied</span>
</div>
<div class="text-center">
<p class="font-bold text-slate-900 dark:text-slate-100">Easy</p>
<p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium">4 days</p>
</div>
</button>
</div>
</section>
<!-- Bottom Navigation Bar -->
<nav class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">style</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Decks</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">play_circle</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Study</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">analytics</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Stats</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Profile</p>
</a>
</nav>
</body></html>
