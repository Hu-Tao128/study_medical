<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        input[type="radio"]:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto bg-white dark:bg-slate-900 shadow-xl">
<!-- Header -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Study Medical</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center rounded-lg text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">info</span>
</button>
</div>
</div>
<!-- Progress and Timer Section -->
<div class="flex flex-col gap-4 p-4">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Question 12 of 40</span>
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mt-1 overflow-hidden">
<div class="bg-primary h-full w-[30%]"></div>
</div>
</div>
<div class="flex gap-2">
<div class="flex flex-col items-center bg-primary/10 dark:bg-primary/20 px-3 py-1 rounded-lg border border-primary/20">
<div class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-sm">timer</span>
<p class="text-primary text-sm font-bold leading-tight">15:00</p>
</div>
</div>
</div>
</div>
</div>
<!-- Question Area -->
<div class="flex-1 overflow-y-auto px-4">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-xl font-bold leading-snug pb-6 pt-2">
                What is the most common cause of community-acquired pneumonia?
            </h3>
<div class="flex flex-col gap-3 pb-8">
<!-- Option A - Selected -->
<label class="flex items-center gap-4 rounded-xl border-2 border-primary bg-primary/5 p-4 cursor-pointer transition-colors">
<div class="flex h-6 w-6 items-center justify-center rounded-full bg-primary text-white text-xs font-bold">A</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Streptococcus pneumoniae</p>
</div>
<input checked="" class="h-5 w-5 border-2 border-primary text-primary focus:ring-primary focus:ring-offset-0 bg-transparent" name="quiz-option" type="radio"/>
</label>
<!-- Option B -->
<label class="flex items-center gap-4 rounded-xl border border-slate-200 dark:border-slate-700 p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<div class="flex h-6 w-6 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-xs font-bold">B</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Haemophilus influenzae</p>
</div>
<input class="h-5 w-5 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent" name="quiz-option" type="radio"/>
</label>
<!-- Option C -->
<label class="flex items-center gap-4 rounded-xl border border-slate-200 dark:border-slate-700 p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<div class="flex h-6 w-6 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-xs font-bold">C</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Mycoplasma pneumoniae</p>
</div>
<input class="h-5 w-5 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent" name="quiz-option" type="radio"/>
</label>
<!-- Option D -->
<label class="flex items-center gap-4 rounded-xl border border-slate-200 dark:border-slate-700 p-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<div class="flex h-6 w-6 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-xs font-bold">D</div>
<div class="flex grow flex-col">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Staphylococcus aureus</p>
</div>
<input class="h-5 w-5 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-transparent" name="quiz-option" type="radio"/>
</label>
</div>
</div>
<!-- Footer Actions -->
<div class="p-4 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
<button class="w-full bg-primary text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                Submit Answer
            </button>
</div>
<!-- Bottom Navigation -->
<div class="flex gap-2 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<span class="material-symbols-outlined filled-icon">book_5</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Study</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">library_books</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Library</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">auto_awesome</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">AI</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-semibold uppercase tracking-wider">Profile</p>
</a>
</div>
</div>
</body></html>
