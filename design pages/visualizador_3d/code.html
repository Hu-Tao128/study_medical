<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>3D Medical Model Viewer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header Overlay -->
<div class="absolute top-0 left-0 right-0 z-10 flex items-center justify-between p-4 bg-gradient-to-b from-background-light/80 dark:from-background-dark/80 to-transparent">
<button class="flex size-11 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-lg text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-lg font-bold tracking-tight">Human Skull Model</h1>
<span class="text-xs font-medium text-primary uppercase tracking-widest">Anatomy Pro</span>
</div>
<button class="flex size-11 items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-lg text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">info</span>
</button>
</div>
<!-- Main 3D Viewer Area -->
<div class="relative flex-1 bg-slate-200 dark:bg-slate-900 overflow-hidden">
<!-- Simulated 3D Scene with background image -->
<div class="absolute inset-0 bg-cover bg-center flex items-center justify-center" data-alt="Detailed 3D anatomical model of a human skull on a dark background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBTdqV4OcbTG01iPROUjWQKNzl7YhgxW9w2R-OkvABnszoUpaDST498phnrcKhzcfvxJwIv1ABl0fNb_LVY25CiBB4ikIIKxc9yMsl3G8weuhPJ5hozgvT2qhARhQOC2mpEK7A6Ov9a0EWsct_awYyQQlGfQ88FIVTdzjZsouk955sRoqOzlUOILCXykRkSchOghtkXDa2VM0PubkXc5SLXMRE8MQ7YwQ_GeLVPxMy9IJN95Rn-rVm86oo4dF0AYj99qBTk-RP8czc");'>
<!-- Interaction Overlay Pins -->
<div class="absolute top-1/3 left-1/2 -translate-x-12 -translate-y-8">
<div class="group relative">
<div class="flex size-6 items-center justify-center rounded-full bg-primary text-white shadow-xl">
<span class="material-symbols-outlined text-sm filled">push_pin</span>
</div>
<div class="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-lg bg-white dark:bg-slate-800 px-3 py-1.5 text-sm font-semibold shadow-xl border border-primary/20">
                            Frontal Bone
                        </div>
</div>
</div>
<div class="absolute top-1/2 right-1/4 -translate-y-12">
<div class="group relative">
<div class="flex size-6 items-center justify-center rounded-full bg-primary/40 text-white backdrop-blur-sm border border-white/20">
<span class="material-symbols-outlined text-sm filled">push_pin</span>
</div>
</div>
</div>
<div class="absolute bottom-1/3 left-1/3">
<div class="group relative">
<div class="flex size-6 items-center justify-center rounded-full bg-primary/40 text-white backdrop-blur-sm border border-white/20">
<span class="material-symbols-outlined text-sm filled">push_pin</span>
</div>
</div>
</div>
</div>
<!-- Floating View Controls (Right Side) -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-3">
<div class="flex flex-col overflow-hidden rounded-xl bg-white/90 dark:bg-slate-800/90 shadow-xl backdrop-blur-md border border-slate-200 dark:border-slate-700">
<button class="flex size-12 items-center justify-center text-slate-700 dark:text-slate-200 hover:bg-primary/10">
<span class="material-symbols-outlined">zoom_in</span>
</button>
<div class="h-px bg-slate-200 dark:bg-slate-700 mx-2"></div>
<button class="flex size-12 items-center justify-center text-slate-700 dark:text-slate-200 hover:bg-primary/10">
<span class="material-symbols-outlined">zoom_out</span>
</button>
</div>
<button class="flex size-12 items-center justify-center rounded-xl bg-white/90 dark:bg-slate-800/90 shadow-xl backdrop-blur-md border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200">
<span class="material-symbols-outlined">3d_rotation</span>
</button>
<button class="flex size-12 items-center justify-center rounded-xl bg-white/90 dark:bg-slate-800/90 shadow-xl backdrop-blur-md border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
<!-- Search and Filter Bar (Bottom of Viewer) -->
<div class="absolute bottom-6 left-0 right-0 px-4 flex flex-col gap-4">
<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
<button class="flex h-9 shrink-0 items-center gap-2 rounded-full bg-primary px-4 text-sm font-medium text-white shadow-lg">
<span class="material-symbols-outlined text-sm">visibility</span>
                        Bones
                    </button>
<button class="flex h-9 shrink-0 items-center gap-2 rounded-full bg-white/90 dark:bg-slate-800/90 px-4 text-sm font-medium text-slate-700 dark:text-slate-200 shadow-lg border border-slate-200 dark:border-slate-700">
                        Nerves
                    </button>
<button class="flex h-9 shrink-0 items-center gap-2 rounded-full bg-white/90 dark:bg-slate-800/90 px-4 text-sm font-medium text-slate-700 dark:text-slate-200 shadow-lg border border-slate-200 dark:border-slate-700">
                        Vascular
                    </button>
<button class="flex h-9 shrink-0 items-center gap-2 rounded-full bg-white/90 dark:bg-slate-800/90 px-4 text-sm font-medium text-slate-700 dark:text-slate-200 shadow-lg border border-slate-200 dark:border-slate-700">
                        Muscles
                    </button>
</div>
<div class="flex items-center gap-2">
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full rounded-full border-none bg-white/95 dark:bg-slate-800/95 py-3 pl-12 pr-4 text-sm font-medium shadow-2xl focus:ring-2 focus:ring-primary dark:text-slate-100" placeholder="Search anatomical parts..." type="text"/>
</div>
<button class="flex size-12 items-center justify-center rounded-full bg-primary text-white shadow-xl">
<span class="material-symbols-outlined">refresh</span>
</button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="flex border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-3">
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-semibold uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">book_4</span>
<span class="text-[10px] font-semibold uppercase tracking-wider">Study</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined filled">library_books</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Library</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">smart_toy</span>
<span class="text-[10px] font-semibold uppercase tracking-wider">AI</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px] font-semibold uppercase tracking-wider">Profile</span>
</a>
</nav>
</div>
</body></html>
